<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
</head>
<body>
    <h1>This is the domo lecture of js</h1>
    <p>In this lecture we will learn about basics of javascript</p>


    <script>

         // var - global, attach with window object with this variable
        console.log("Hello world!");
        var collegeName = "ABES"; 
        document.write(collegeName);

       
        function hello(){
            var myNum = 45343434; // local or function level
            console.log(myNum);
        }

        //from ES6: let and const
            let msg = "Welcome";
            console.log(msg);

            const msg2 = "Thanks";
            console.log(msg2);
            
        hello();
    </script>
</body>
</html>
