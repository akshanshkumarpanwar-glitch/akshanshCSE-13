<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/src/style.css" rel="stylesheet">
</head>
<body>
  <div class="w-screen h-screen dark:bg-gray-800 flex justify-center items-center">
      <form class="w-sm h-110 bg-gray-200 rounded-2xl p-5 flex flex-col items-center gap-3">
          <h1 class="text-2xl font-bold tracking-wide">Welcome back</h1>
          <p class="text-sm">Welcome back! Please enter your details.</p>
          <div class="w-full flex flex-col gap-3 mt-5">
            <div class="email flex flex-col gap-2">
              <label for="email" class="text-lg font-bold">Email</label>
              <input class="border border-0.5 p-1" id="email" type="email" placeholder="Enter your email">
            </div>
            <div class="password flex flex-col gap-2">
              <label for="password" class="text-lg font-bold">Password</label>
              <input class="border border-0.5 p-1" id="email" type="password" placeholder="password">
            </div>
            </div>
            <a class="hover:text-amber-500" href="#">Forgot password</a>
            <div class="flex flex-col gap-2 w-full">
            <button class="border px-5 py-2 rounded-xl bg-black text-gray-50 cursor-pointer">Login</button>
            <button class="border px-5 py-2 rounded-xl bg-black text-gray-50 cursor-pointer">Sign with Google</button>
          </div>
      </form>
  </div>
</body>
</html>
